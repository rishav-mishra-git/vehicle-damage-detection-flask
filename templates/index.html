<!DOCTYPE html>
<html>

<head>

    <title>AI Vehicle Damage Detection</title>

    <link
        rel="stylesheet"
        href="/static/style.css"
    >

</head>

<body>

    <div class="container">

        <h1>
            🚗 AI Vehicle Damage Detection
        </h1>

        <p class="subtitle">
            Upload vehicle image to detect damages
            and estimate repair cost
        </p>

        <div class="upload-section">

            <input
                type="file"
                id="imageInput"
            >

            <button onclick="uploadImage()">
                Detect Damage
            </button>

        </div>

        <div id="loading"></div>

        <div id="preview"></div>

        <div id="result"></div>

    </div>

    <script src="/static/script.js"></script>

</body>

</html>
